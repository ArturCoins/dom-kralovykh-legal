<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TikTok Auth</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; text-align: center; }
    .code-box { background: #f4f4f4; border: 2px solid #333; padding: 20px; font-size: 18px; font-weight: bold; word-break: break-all; margin: 20px 0; border-radius: 8px; }
    .error { color: red; }
  </style>
</head>
<body>
  <h2>TikTok Authorization</h2>
  <div id="result"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const el = document.getElementById('result');
    if (code) {
      el.innerHTML = '<p>Copy this code:</p><div class="code-box">' + code + '</div>';
    } else if (error) {
      el.innerHTML = '<p class="error">Error: ' + error + '</p>';
    } else {
      el.innerHTML = '<p class="error">No code received.</p>';
    }
  </script>
</body>
</html>
